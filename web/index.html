<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Connectify: A real-time communication and social network app featuring Agora RTC, Firebase, and a robust Feature-First Architecture.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Connectify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Connectify</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0F172A;
      color: #F8FAFC;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .loading-container {
      max-width: 600px;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #818CF8, #C084FC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #818CF8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .features {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #94A3B8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <h1>Connectify</h1>
    <p>Loading your experience...</p>
    <div class="spinner"></div>
    <div class="features">
      <strong>Key Features</strong><br>
      Real-Time Communication (Agora RTC, CallKit)<br>
      Social Network (Feeds, Reels, Follower System)<br>
      Premium UI/UX (Modern Aesthetics, Fluid Animations)<br>
      Robust Architecture (Feature-First, Riverpod, Firebase)
    </div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
